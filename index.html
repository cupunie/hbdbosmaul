<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>BOS MAUL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Impact&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
            background: #000;
        }

        /* Background Video */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.75) contrast(1.1);
        }

        /* 4 Foto Pojok - Diperbaiki untuk Mobile */
        .corner-image {
            position: fixed;
            width: 220px;
            height: 220px;
            border-radius: 20px;
            object-fit: cover;
            border: 5px solid rgba(255, 215, 0, 0.95);
            box-shadow: 0 0 50px #ffd700,
                        0 0 100px #c026d3,
                        0 0 150px #7e22ce;
            z-index: 20;
            opacity: 0.92;
            pointer-events: none;
        }

        .top-left   { top: 12px; left: 12px; }
        .top-right  { top: 12px; right: 12px; }
        .bottom-left{ bottom: 12px; left: 12px; }
        .bottom-right{ bottom: 12px; right: 12px; }

        @media (max-width: 768px) {
            .corner-image {
                width: 140px;
                height: 140px;
            }
            .top-left   { top: 8px; left: 8px; }
            .top-right  { top: 8px; right: 8px; }
            .bottom-left{ bottom: 8px; left: 8px; }
            .bottom-right{ bottom: 8px; right: 8px; }
        }

        @media (max-width: 480px) {
            .corner-image {
                width: 110px;
                height: 110px;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(75,0,130,0.45));
            padding: 20px 12px;
        }

        .meme-text {
            font-family: 'Impact', sans-serif;
            -webkit-text-stroke: 4px black;
            text-shadow: 0 0 25px #ffd700,
                         5px 5px 0 #000,
                        -5px -5px 0 #000;
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-20px) rotate(4deg); }
        }

        /* Smooth Scroll & Touch */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video class="background-video" autoplay muted loop playsinline>
        <source src="https://files.catbox.moe/8v06yd.mp4" type="video/mp4">
    </video>

    <!-- 4 Foto Pojok -->
    <img src="bandng.jpg" class="corner-image top-left" alt="">
    <img src="op.jpg" class="corner-image top-right" alt="">
    <img src="may.jpg" class="corner-image bottom-left" alt="">
    <img src="bro.jpg" class="corner-image bottom-right" alt="">

    <div class="content">
        <!-- Video Tengah -->
        <div class="w-full max-w-[1000px] px-2 sm:px-4">
            <div class="aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl relative mx-auto border-4 border-yellow-400">
                <video class="w-full h-full object-cover" controls autoplay muted loop playsinline>
                    <source src="https://files.catbox.moe/htyaqh.mp4" type="video/mp4">
                </video>
                <div class="absolute top-4 left-4 bg-red-600 text-white px-6 py-2.5 rounded-full font-bold text-xl sm:text-2xl animate-pulse z-10">
                    🔥 BOS MAUL GUA 🔥
                </div>
            </div>
        </div>

        <!-- Text -->
        <div class="text-center mt-8 px-4">
            <div class="inline-block bg-black/90 backdrop-blur-md px-10 sm:px-14 py-6 rounded-3xl border-4 border-yellow-400">
                <div class="text-yellow-400 text-5xl sm:text-6xl meme-text tracking-tight">HAPPY BIRTHDAY</div>
                <h1 class="text-5xl sm:text-6xl font-bold meme-text text-yellow-300 mt-2 leading-none">
                    BOS MAULS<br>X AMAY
                </h1>
            </div>
        </div>

        <!-- Tombol -->
        <div class="flex flex-wrap gap-4 justify-center mt-10">
            <button onclick="toggleMusic()" id="musicBtn"
                    class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 px-8 py-4 rounded-2xl font-bold text-lg shadow-xl hover:scale-105 active:scale-95 transition-all duration-200">
                🎵 Musik ON
            </button>
            
            <button onclick="launchCrazyConfetti()" 
                    class="bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-300 hover:to-orange-400 px-8 py-4 rounded-2xl font-bold text-lg shadow-xl hover:scale-105 active:scale-95 transition-all duration-200 text-black">
                🎉 Fireworks
            </button>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/put-your-music-link-here.mp3" type="audio/mpeg">
    </audio>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.textContent = "🎵 Musik ON";
            } else {
                music.play().catch(() => {
                    alert("Ketuk lagi untuk memutar musik 🎵");
                });
                musicBtn.textContent = "⏸️ Musik OFF";
            }
            isPlaying = !isPlaying;
        }

        function launchCrazyConfetti() {
            const colors = ['#ffd700', '#ff00ff', '#00ffff', '#ff1493', '#39ff14'];
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    confetti({
                        particleCount: 280,
                        spread: 90,
                        origin: { y: Math.random() - 0.2 },
                        colors: colors
                    });
                }, i * 110);
            }
        }

        // Auto confetti saat halaman dibuka
        window.onload = () => {
            setTimeout(launchCrazyConfetti, 600);
            setTimeout(launchCrazyConfetti, 1800);
        };
    </script>
</body>
</html>
