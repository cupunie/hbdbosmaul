<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BOS MAUL - Happy Birthday</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Impact&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            overflow-x: hidden;
            background: #000;
        }
        .background-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.7) contrast(1.15);
        }

        .corner-image {
            position: fixed;
            width: 180px;
            height: 180px;
            border-radius: 18px;
            object-fit: cover;
            border: 5px solid #fcd34d;
            box-shadow: 0 0 40px #facc15,
                        0 0 80px #c026d3;
            z-index: 30;
            opacity: 0.95;
        }
        .top-left   { top: 12px; left: 12px; }
        .top-right  { top: 12px; right: 12px; }
        .bottom-left{ bottom: 12px; left: 12px; }
        .bottom-right{ bottom: 12px; right: 12px; }

        @media (min-width: 768px) {
            .corner-image { width: 280px; height: 280px; }
            .top-left   { top: 30px; left: 30px; }
            .top-right  { top: 30px; right: 30px; }
            .bottom-left{ bottom: 30px; left: 30px; }
            .bottom-right{ bottom: 30px; right: 30px; }
        }

        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video class="background-video" autoplay muted loop playsinline>
        <source src="https://files.catbox.moe/8v06yd.mp4" type="video/mp4">
    </video>

    <!-- 4 Foto Pojok -->
    <img src="bandng.jpg" class="corner-image top-left" alt="">
    <img src="op.jpg" class="corner-image top-right" alt="">
    <img src="may.jpg" class="corner-image bottom-left" alt="">
    <img src="bro.jpg" class="corner-image bottom-right" alt="">

    <div class="main-content">
        <!-- Video Utama -->
        <div class="w-full max-w-md mb-6">
            <div class="aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border-4 border-yellow-400 relative">
                <video class="w-full h-full object-cover" controls autoplay muted loop playsinline>
                    <source src="https://files.catbox.moe/htyaqh.mp4" type="video/mp4">
                </video>
                <div class="absolute top-3 left-3 bg-red-600 text-white text-sm font-bold px-4 py-1 rounded-full">
                    🔥 BOS MAUL GUA 🔥
                </div>
            </div>
        </div>

        <!-- Text -->
        <div class="text-center mb-8">
            <div class="bg-black/80 border-4 border-yellow-400 rounded-3xl px-8 py-6 inline-block">
                <div class="text-yellow-300 text-4xl font-black tracking-wider" style="text-shadow: 3px 3px 0 #000, -3px -3px 0 #000;">
                    HAPPY BIRTHDAY
                </div>
                <div class="text-yellow-400 text-5xl font-black mt-1" style="text-shadow: 4px 4px 0 #000;">
                    BOS MAULS<br>X AMAY
                </div>
            </div>
        </div>

        <!-- Tombol -->
        <div class="flex gap-4">
            <button onclick="toggleMusic()" id="musicBtn"
                    class="bg-gradient-to-r from-violet-600 to-fuchsia-600 px-8 py-4 rounded-2xl font-bold text-white shadow-xl active:scale-95">
                🎵 Putar Musik
            </button>
            
            <button onclick="launchCrazyConfetti()" 
                    class="bg-gradient-to-r from-yellow-400 to-orange-500 px-8 py-4 rounded-2xl font-bold text-black shadow-xl active:scale-95">
                🎉 Fireworks
            </button>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/put-your-music-link-here.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.innerHTML = "🎵 Putar Musik";
            } else {
                music.play().then(() => {
                    musicBtn.innerHTML = "⏸️ Matikan Musik";
                }).catch(() => {
                    alert("Klik sekali lagi untuk memutar musik 🎵");
                });
            }
            isPlaying = !isPlaying;
        }

        function launchCrazyConfetti() {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } });
                }, i * 100);
            }
        }

        // Auto confetti
        window.onload = () => {
            setTimeout(launchCrazyConfetti, 800);
        };
    </script>
</body>
</html>
